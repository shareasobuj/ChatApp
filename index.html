<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Web Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="login-container" class="overlay">
        <div class="login-box">
            <h2><i class="fab fa-whatsapp"></i> Private Chat</h2>
            
            <div id="auth-section">
                <input type="email" id="email" placeholder="আপনার ইমেইল লিখুন..." required>
                <input type="password" id="password" placeholder="পাসওয়ার্ড (নূন্যতম ৬ অক্ষর)..." required>
                <input type="text" id="username" placeholder="আপনার নাম লিখুন..." class="hidden">
                
                <button id="auth-main-btn">লগইন করুন</button>
                <p class="toggle-text" id="toggle-auth">নতুন অ্যাকাউন্ট তৈরি করতে এখানে ক্লিক করুন</p>
            </div>

            <div id="room-section" class="hidden">
                <p class="welcome-msg">স্বাগতম, <span id="user-display-name"></span>!</p>
                <input type="text" id="room-id" placeholder="রুম আইডি (যেমন: room123)..." required>
                <button id="join-btn">রুমে প্রবেশ করুন</button>
                <button id="logout-btn" style="background-color: #d32f2f; margin-top: 5px;">লগআউট</button>
            </div>
        </div>
    </div>

    <div id="chat-container" class="chat-hidden">
        <header class="chat-header">
            <div class="room-info">
                <h3><i class="fas fa-lock"></i> <span id="current-room-title">Room</span></h3>
                <p>ব্যবহারকারী: <span id="current-user-title">Guest</span></p>
            </div>
            <button id="leave-btn"><i class="fas fa-sign-out-alt"></i> Leave</button>
        </header>

        <main id="chat-messages" class="chat-messages"></main>

        <footer class="chat-footer">
            <label for="image-input" class="upload-btn">
                <i class="fas fa-paperclip"></i>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
            </label>
            <input type="text" id="message-input" placeholder="মেসেজ লিখুন..." autocomplete="off">
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
