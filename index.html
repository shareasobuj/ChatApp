<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Web Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="brand-header">
            <i class="fab fa-whatsapp brand-icon"></i>
            <h2 id="formTitle">Private Chat</h2>
        </div>

        <form id="authForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="আপনার ইমেইল দিন" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="পাসওয়ার্ড দিন" required>
            </div>

            <button type="submit" id="mainBtn" class="submit-btn">লগইন করুন</button>
        </form>

        <div class="toggle-container">
            <a href="#" id="toggleLink">নতুন অ্যাকাউন্ট তৈরি করতে এখানে ক্লিক করুন</a>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    
    <script>
        const formTitle = document.getElementById('formTitle');
        const mainBtn = document.getElementById('mainBtn');
        const toggleLink = document.getElementById('toggleLink');
        let isLoginView = true;

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginView = !isLoginView;

            if (!isLoginView) {
                formTitle.innerText = "Private Chat (Sign Up)";
                mainBtn.innerText = "সাইন-আপ করুন";
                toggleLink.innerText = "আগের অ্যাকাউন্ট থাকলে লগইন করুন";
                mainBtn.id = "signupBtn"; // JS ফাইলের সাথে মিলানোর জন্য ID পরিবর্তন
            } else {
                formTitle.innerText = "Private Chat";
                mainBtn.innerText = "লগইন করুন";
                toggleLink.innerText = "নতুন অ্যাকাউন্ট তৈরি করতে এখানে ক্লিক করুন";
                mainBtn.id = "loginBtn";
            }
        });
    </script>
</body>
</html>
